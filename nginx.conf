# Set the user and group to run nginx as
user nginx;

# Number of worker processes
worker_processes auto;

# Set the error log file and log level
error_log /var/log/nginx/error.log warn;

# Set the pid file
pid /var/run/nginx.pid;

# Configure events
events {
    worker_connections 1024;
}

# Configure HTTP server
http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
    # Set the MIME types
    include /etc/nginx/mime.types;

    # Set the default log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                                    '$status $body_bytes_sent "$http_referer" '
                                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Set the access log file
    access_log /var/log/nginx/access.log main;

    # Set the server block
    server {
        # Set the listen port
        listen 80;

        #server_name localhost;

        # Set the location block proxy to t2:8080
        location / {
            proxy_pass http://t2:8080;
        }

        # /api to t1:8000
        location /api {
            proxy_pass http://t1:8000;
        }
    }
    
    # https
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        location / {
            proxy_pass http://t2:8080;
        }

        # location /api and remove /api
        location /api {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://t1:8000;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }
    }
}

