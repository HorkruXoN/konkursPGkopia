version: '3'
services:
  t1:
    build: ./backend
    depends_on:
      - mongodb
    networks:
      - kpgnetwork
  t2:
    # build is in frontend/dockerfile
    build: ./frontend
    depends_on:
      - t1
    networks:
      - kpgnetwork
  mongodb:
    image: mongo
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
    networks:
      - kpgnetwork
  nginx:
    image: nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./nginx.crt:/etc/nginx/ssl/nginx.crt:ro
      - ./nginx.key:/etc/nginx/ssl/nginx.key:ro
    depends_on:
      - t1
      - t2
    networks:
      - kpgnetwork

networks:
  kpgnetwork:
    driver: bridge

volumes:
  mongo-data:
